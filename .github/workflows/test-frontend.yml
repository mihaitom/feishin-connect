name: Frontend Tests

on:
    workflow_dispatch:
    push:
        branches: [development, main]
        paths:
            - src/**
            - package.json
            - pnpm-lock.yaml
            - vitest.config.ts
            - vitest.setup.ts
    pull_request:
        paths:
            - src/**
            - package.json
            - pnpm-lock.yaml
            - vitest.config.ts
            - vitest.setup.ts

jobs:
    test:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

            - name: Install Node and PNPM
              uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0

            - name: Install dependencies
              run: pnpm install

            - name: Run tests
              run: pnpm run test
