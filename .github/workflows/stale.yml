name: 'Close stale issues and PRs'
on:
    workflow_dispatch:
    schedule:
        - cron: '30 1 * * *'
permissions:
    contents: read
jobs:
    stale:
        permissions:
            issues: write
            pull-requests: write
        runs-on: ubuntu-latest
        steps:
            - uses: dessant/lock-threads@89ae32b08ed1a541efecbab17912962a5e38981c # v6.0.2

              with:
                  process-only: 'issues, prs'
                  issue-inactive-days: 120
                  pr-inactive-days: 120
                  log-output: true
                  add-issue-labels: 'frozen-due-to-age'
                  add-pr-labels: 'frozen-due-to-age'
            - uses: actions/stale@5bef64f19d7facfb25b37b414482c7164d639639 # v9.1.0
              with:
                  operations-per-run: 999
                  days-before-issue-stale: 180
                  days-before-pr-stale: 180
                  days-before-issue-close: 30
                  days-before-pr-close: 30
                  stale-issue-message: >
                      This issue has been automatically marked as stale because it has not had recent activity. This fork is maintained in spare time, so we appreciate your patience.

                      If this is a **bug** and you can still reproduce this error on the <code>development</code> branch, please reply with all of the information you have about it in order to keep the issue open.

                      This issue will automatically be closed in the near future if no further activity occurs. Thank you for all your contributions.


                  stale-pr-message: >
                      This PR has been automatically marked as stale because it has not had recent activity. This fork is maintained in spare time, so we appreciate your patience.

                      This PR will automatically be closed in the near future if no further activity occurs. Thank you for all your contributions.


                  stale-issue-label: 'stale'
                  exempt-issue-labels: 'keep,security,enhancement'
                  stale-pr-label: 'stale'
                  exempt-pr-labels: 'keep,security'