appId: org.jeffvli.feishin
productName: Feishin-Connect
artifactName: ${productName}-${version}-${os}-${arch}.${ext}
electronVersion: 39.4.0
directories:
    buildResources: assets
files:
    - 'out/**/*'
    - 'package.json'
extraResources:
    - assets/**
    - from: connect/dist/connect-server
      to: connect-server
      filter:
          - '**/*'
asarUnpack:
    - resources/**
win:
    target:
        - target: zip
          arch:
              - x64
              - arm64
        - target: nsis
          arch:
              - x64
              - arm64
    icon: assets/icons/icon.ico

nsis:
    allowToChangeInstallationDirectory: true
    oneClick: false
    shortcutName: ${productName}
    uninstallDisplayName: ${productName}
    createDesktopShortcut: always

mac:
    target:
        - target: dmg
          arch:
              - arm64
              - x64
        - target: zip
          arch:
              - arm64
              - x64
    icon: media/feishin.icon
    type: distribution
    hardenedRuntime: false
    identity: '-'
    gatekeeperAssess: false
    notarize: false
    extendInfo:
        NSAudioCaptureUsageDescription: 'System audio access is required for mpv visualizer capture in Feishin'
        NSLocalNetworkUsageDescription: 'Local network is necessary for accessing servers hosted on the same system as Feishin'

dmg:
    contents: [{ x: 130, y: 220 }, { x: 410, y: 220, type: link, path: /Applications }]

linux:
    target:
        - AppImage
        - deb
        - tar.xz
    category: AudioVideo;Audio;Player
    icon: assets/icons/icon.png
    artifactName: ${productName}-${os}-${arch}.${ext}

toolsets:
    appimage: '1.0.2'

npmRebuild: false
afterAllArtifactBuild: scripts/after-all-artifact-build.mjs
publish:
    provider: github
    owner: mihaitom
    repo: feishin-connect
    channel: latest
    releaseType: draft
